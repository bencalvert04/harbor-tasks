schema_version = "1.3"
multi_step_reward_strategy = "final"

[task]
name = "harbor/author-a-calibrated-task"
description = "Agent must author a Harbor task that is solvable, hard for Haiku, and passable by Opus."
keywords = ["meta", "task-authoring", "agent-eval"]

[metadata]
category = "meta"
difficulty_explanation = "Author must calibrate a sub-task into the Haiku-fail / Opus-pass band."

[metadata.target]
capability       = "Ability to write a correct multi-criteria SPARQL query from a written spec"
domain           = "coding"
inner_agent      = "claude-code"
inner_verifier   = "pytest"
difficulty_lever = "simultaneous multi-criteria complexity — role filter, EU geographic constraint, date-based active enrollment count, HAVING aggregation, and exact GROUP_CONCAT format; weak models drop one or more criteria"
constraints      = "deterministic; binary reward; no network at inner runtime; inner agent sees only instruction.md; hidden test uses a different TTL dataset so answers cannot be hardcoded"
forbidden        = "no hardcoded professor names; no reading the hidden test TTL; no domain mismatch"

[environment]
workdir = "/app"
build_timeout_sec = 1200.0
allow_internet = true
cpus = 2
memory_mb = 4096
# Author env routes Anthropic calls through the local metered proxy (budget enforcement).
env = { HARBOR_PROVIDER = "daytona", ANTHROPIC_BASE_URL = "http://localhost:8080", PROXY_API_KEY = "${ANTHROPIC_API_KEY}", DAYTONA_API_KEY = "${DAYTONA_API_KEY}" }

# ---- Step 1: build a valid, solvable inner task (free checks only) ----
[[steps]]
name = "step-1"
# Gate: step 1's verifier must emit reward["reward"] >= 0.5 (buildable + null
# fails + reference passes) to proceed. If it aborts here, strategy="final"
# uses THIS step's result (0.00/0.25) as the trial reward — matches §4.
min_reward = 0.5

[steps.agent]
timeout_sec = 1800.0

[steps.verifier]
# Shared verifier (runs in the author's env). Only runs oracle + null — no model tokens.
timeout_sec = 600.0

# ---- Step 2: calibrate difficulty, then grade (shared verifier) ----
[[steps]]
name = "step-2"
# The container filesystem persists across steps, so /app/inner_task (built in
# step 1) is already visible to this step's shared verifier — no transfer
# needed. This artifact line is just a debug snapshot into steps/calibrate/artifacts/.
artifacts = ["/app/inner_task"]

[steps.agent]
timeout_sec = 2400.0

[steps.verifier]
# Shared verifier: the grading code (tests/) is copied in only at verify time,
# so the author never sees it during the agent phase. It re-derives the full
# §4 ladder and spends the reserved 1 Opus + 2 Haiku grade runs.
timeout_sec = 3600.0             # must cover 1 Opus + 2 Haiku inner runs
# CLEAN grading key + direct API base, overriding the author env's proxy so
# grading is independent of (and invisible to) the author's probe budget.
[steps.verifier.env]
ANTHROPIC_API_KEY = "${GRADER_ANTHROPIC_API_KEY}"
ANTHROPIC_BASE_URL = "https://api.anthropic.com"
HARBOR_PROVIDER = "daytona"
